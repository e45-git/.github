name: Sincronizar Status com o Portfolio

on:
  project_v2_item:
    types: [edited] # Dispara quando QUALQUER campo do Project v2 (como o Status) mudar

jobs:
  sync-status:
    runs-on: ubuntu-latest
    # Garante que só vai rodar se o campo alterado no projeto foi o "Status"
    if: github.event.changes.field_value.field_name == 'Status'
    
    steps:
      - name: Sincronizar com o Projeto Central
        env:
          GH_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN }}
          ORGANIZATION: "strato-git"
          PORTFOLIO_NUMBER: 5 
        
        run: |
          # 1. Identifica o ID global da Issue ou PR que foi movido
          CONTENT_NODE_ID="${{ github.event.project_v2_item.content_node_id }}"
          
          echo "Buscando o novo status textual..."
          
          # 2. Pega o nome exato da nova coluna para onde o card foi
          STATUS_TEXT=$(gh api graphql -f query='
            query($item_id: ID!) {
              node(id: $item_id) {
                ... on ProjectV2Item {
                  fieldValueByName(name: "Status") {
                    ... on ProjectV2ItemFieldSingleSelectValue { name }
                  }
                }
              }
            }' -f item_id="${{ github.event.project_v2_item.id }}" --jq '.data.node.fieldValueByName.name')

          if [ -z "$STATUS_TEXT" ] || [ "$STATUS_TEXT" = "null" ]; then
            echo "Não foi possível detectar o nome da coluna."
            exit 0
          fi

          echo "O novo status é: $STATUS_TEXT"
          echo "Sincronizando com o projeto Portfolio ($PORTFOLIO_NUMBER)..."

          # 3. Busca a estrutura do Portfolio para encontrar o ID da coluna equivalente
          gh api graphql -f query='
            query($org: String!, $project_num: Int!) {
              organization(login: $org) {
                projectV2(number: $project_num) {
                  id
                  field(name: "Status") {
                    ... on ProjectV2SingleSelectField {
                      id
                      options { id name }
                    }
                  }
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue { id }
                        ... on PullRequest { id }
                      }
                    }
                  }
                }
              }
            }' -f org="$ORGANIZATION" -g project_num=$PORTFOLIO_NUMBER > projeto_info.json

          PROJECT_ID=$(jq -r '.data.organization.projectV2.id' projeto_info.json)
          FIELD_ID=$(jq -r '.data.organization.projectV2.field.id' projeto_info.json)
          OPTION_ID=$(jq -r --arg status "$STATUS_TEXT" '.data.organization.projectV2.field.options[] | select(.name==$status) | .id' projeto_info.json)
          ITEM_ID=$(jq -r --arg content "$CONTENT_NODE_ID" '.data.organization.projectV2.items.nodes[] | select(.content.id==$content) | .id' projeto_info.json)

          # 4. Se o item existir no Portfolio, atualiza a coluna dele
          if [ "$ITEM_ID" != "null" ] && [ "$OPTION_ID" != "null" ]; then
            echo "Item encontrado no Portfolio. Atualizando..."
            gh api graphql -f query='
              mutation($project: ID!, $item: ID!, $field: ID!, $option: ID!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project,
                  itemId: $item,
                  fieldId: $field,
                  value: { singleSelectOptionId: $option }
                }) {
                  projectV2Item { id }
                }
              }' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$FIELD_ID" -f option="$OPTION_ID"
            echo "Sincronização concluída com sucesso!"
          else
            echo "Aviso: O item não está no Portfolio ou a coluna '$STATUS_TEXT' não existe lá."
          fi